<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="description" content="MiExpediente – Seguimiento de causas judiciales">
  <title>MiExpediente</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon-192.svg">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/mobile.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="app">
    <div id="loading-screen" class="loading-screen">
      <img src="assets/logo.svg" alt="MiExpediente" width="80">
      <p class="loading-text">Cargando...</p>
    </div>
    <header id="app-header" class="app-header" style="display:none"></header>
    <aside id="app-sidebar" class="app-sidebar" style="display:none"></aside>
    <main id="view-container" class="view-container" style="display:none"></main>
  </div>
  <div id="toast-container" class="toast-container"></div>
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="modal-box" class="modal-box"></div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/whatsapp.js"></script>
  <script src="js/router.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
