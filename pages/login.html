<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Iniciar sesión — Mi Expediente</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <img src="../assets/logo.svg" alt="Mi Expediente" width="60" height="60">
      <h1>Mi Expediente</h1>
      <p>Estudio Jurídico Manulis</p>
    </div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Ver contraseña">👁</button>
      </div>
      <div id="login-error" class="error-msg" hidden></div>
      <button type="submit" class="btn-primary btn-block" id="btn-login">Ingresar</button>
    </form>

    <div class="auth-divider">¿No tenés acceso?</div>
    <button class="btn-secondary btn-block" onclick="solicitarAcceso()">
      📲 Solicitar acceso por WhatsApp
    </button>

    <div class="auth-footer" style="margin-top:1.5rem">
      <small>v1.0 · Estudio Jurídico Manulis</small>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../config/config.js"></script>
  <script src="../config/roles.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Redirigir si ya hay sesión
    const sess = Auth.getSession();
    if (sess) {
      location.href = sess.rol === 'admin'
        ? 'admin/dashboard.html' : 'cliente/dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('login-error');
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      btn.disabled = true;
      btn.textContent = 'Verificando...';
      err.hidden = true;

      const result = Auth.login(email, pw);
      if (result.ok) {
        btn.textContent = '✓ Ingresando...';
        setTimeout(() => {
          location.href = result.role === 'admin'
            ? 'admin/dashboard.html' : 'cliente/dashboard.html';
        }, 400);
      } else {
        err.textContent = result.message;
        err.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Ingresar';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });

    document.getElementById('toggle-pw').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      this.textContent = show ? '🙈' : '👁';
    });

    function solicitarAcceso() {
      const nombre = prompt('Tu nombre y apellido:');
      if (!nombre) return;
      const email = prompt('Tu email:');
      if (!email) return;
      const msg = encodeURIComponent(
        `Hola, quisiera solicitar acceso a Mi Expediente.\n\nNombre: ${nombre}\nEmail: ${email}`
      );
      window.open(`https://wa.me/${APP_CONFIG.adminWhatsApp}?text=${msg}`, '_blank');
    }
  </script>
</body>
</html>
